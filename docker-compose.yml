version: "3.9"

services:
  credentials-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: credentials
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5494:5432"
    volumes:
      - credentials_pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d credentials"]
      interval: 5s
      timeout: 5s
      retries: 5

  credentials-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8094:8094"
    environment:
      DB_HOST: credentials-db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: credentials
      SERVER_PORT: "8094"
      JWT_SECRET: "change-this-in-production"
    depends_on:
      credentials-db:
        condition: service_healthy

volumes:
  credentials_pgdata: